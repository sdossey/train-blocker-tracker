name: Train Status Poller

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (~2,880 runs/month — well within free tier)
  workflow_dispatch:          # also lets you trigger it manually from the GitHub UI

permissions:
  contents: write             # needed to commit the CSV back to the repo

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run poller (single poll)
        run: python train_poller.py

      - name: Commit updated CSV (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add train_history.csv train_state.json
          # Only commit if there's actually something new
          git diff --cached --quiet || git commit -m "chore: update train history [skip ci]"
          git push
